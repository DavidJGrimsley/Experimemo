name: EAS TestFlight Release

on:
  push:
    branches:
      - test
  workflow_dispatch:

concurrency:
  group: eas-testflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release_ios_testflight:
    name: Build and submit iOS to TestFlight
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN GitHub secret."
            echo "Create one from https://expo.dev/settings/access-tokens and add it in this repo's Actions secrets."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run ci:verify --if-present

      - name: Build and auto-submit to TestFlight
        run: eas build --platform ios --profile testflight --auto-submit --non-interactive --wait --message "test ${GITHUB_SHA}"
