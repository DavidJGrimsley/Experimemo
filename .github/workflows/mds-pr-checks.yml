name: MDS PR Checks

on:
  pull_request:
    branches: [test, main]
  push:
    branches: [test]
  workflow_dispatch:

concurrency:
  group: mds-pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify project
        run: npm run ci:verify --if-present
